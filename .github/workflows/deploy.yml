name: Build & Deploy to AWS

on:
  push:
    branches: [main]

env:
  REGISTRY: docker.io/${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  build-and-push:
    name: Build Docker images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: api-gateway
            dockerfile: api-gateway/Dockerfile
          - name: user-service
            dockerfile: user-service/Dockerfile
          - name: task-service
            dockerfile: task-service/Dockerfile
          - name: chat-service
            dockerfile: chat-service/Dockerfile
          - name: payment-service
            dockerfile: payment-service/Dockerfile
          - name: search-service
            dockerfile: search-service/Dockerfile
          - name: notification-service
            dockerfile: notification-service/Dockerfile
          - name: email-service
            dockerfile: email-service/Dockerfile

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Log in to Docker Hub
        uses: docker/login-action@v3.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/taskero-${{ matrix.service.name }}:latest
            ${{ env.REGISTRY }}/taskero-${{ matrix.service.name }}:${{ github.sha }}

  deploy:
    name: Deploy to EC2
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/taskero-backend

            git pull origin main

            REGISTRY=${{ env.REGISTRY }} ./scripts/deploy.sh

            for svc in api-gateway user-service task-service chat-service \
                       payment-service search-service notification-service email-service; do
              sudo microk8s kubectl rollout restart deployment/$svc -n taskero
            done

            sudo microk8s kubectl rollout status deployment/api-gateway -n taskero --timeout=120s
