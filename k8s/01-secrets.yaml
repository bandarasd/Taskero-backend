# Apply with: kubectl apply -f 01-secrets.yaml -n taskero
# All values must be base64-encoded: echo -n "value" | base64
#
# Generate your own values:
#   DB creds, Cloudinary, Stripe, Firebase service account key, email creds
#
# DO NOT commit this file with real secrets. Use a secrets manager or
# fill in during CI/CD via envsubst / kubectl create secret.

apiVersion: v1
kind: Secret
metadata:
  name: taskero-db-secret
  namespace: taskero
type: Opaque
stringData:
  DB_USER: "dana"
  DB_PASSWORD: "dana2002"       # ← change before deploying
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_NAME: "taskero_db"
---
apiVersion: v1
kind: Secret
metadata:
  name: taskero-cloudinary-secret
  namespace: taskero
type: Opaque
stringData:
  CLOUDINARY_CLOUD_NAME: "dmngdv4pi"
  CLOUDINARY_API_KEY: "459971389541374"
  CLOUDINARY_API_SECRET: "REPLACE_ME"   # ← fill in
---
apiVersion: v1
kind: Secret
metadata:
  name: taskero-stripe-secret
  namespace: taskero
type: Opaque
stringData:
  STRIPE_SECRET_KEY: "REPLACE_ME"        # ← fill in
  STRIPE_PUBLISHABLE_KEY: "REPLACE_ME"   # ← fill in
---
apiVersion: v1
kind: Secret
metadata:
  name: taskero-email-secret
  namespace: taskero
type: Opaque
stringData:
  EMAIL_HOST: "smtp.gmail.com"
  EMAIL_PORT: "587"
  EMAIL_USER: "taskerolk@gmail.com"
  EMAIL_PASS: "REPLACE_ME"               # ← fill in
---
apiVersion: v1
kind: Secret
metadata:
  name: taskero-internal-secret
  namespace: taskero
type: Opaque
stringData:
  INTERNAL_API_KEY: "taskero-internal-secret-2026"
---
