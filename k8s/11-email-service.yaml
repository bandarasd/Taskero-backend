apiVersion: apps/v1
kind: Deployment
metadata:
  name: email-service
  namespace: taskero
spec:
  replicas: 1
  selector:
    matchLabels:
      app: email-service
  template:
    metadata:
      labels:
        app: email-service
    spec:
      containers:
        - name: email-service
          image: REGISTRY/taskero-email-service:latest
          ports:
            - containerPort: 3007
          envFrom:
            - secretRef:
                name: taskero-db-secret
            - secretRef:
                name: taskero-email-secret
          env:
            - name: PORT
              value: "3007"
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /secrets/firebase/serviceAccountKey.json
          volumeMounts:
            - name: firebase-secret
              mountPath: /secrets/firebase
              readOnly: true
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
      volumes:
        - name: firebase-secret
          secret:
            secretName: taskero-firebase-secret
---
apiVersion: v1
kind: Service
metadata:
  name: email-service
  namespace: taskero
spec:
  selector:
    app: email-service
  ports:
    - port: 3007
      targetPort: 3007
