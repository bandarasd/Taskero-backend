apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: taskero
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: REGISTRY/taskero-payment-service:latest
          ports:
            - containerPort: 3004
          envFrom:
            - secretRef:
                name: taskero-db-secret
            - secretRef:
                name: taskero-stripe-secret
          env:
            - name: PORT
              value: "3004"
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /secrets/firebase/serviceAccountKey.json
          volumeMounts:
            - name: firebase-secret
              mountPath: /secrets/firebase
              readOnly: true
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
      volumes:
        - name: firebase-secret
          secret:
            secretName: taskero-firebase-secret
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: taskero
spec:
  selector:
    app: payment-service
  ports:
    - port: 3004
      targetPort: 3004
