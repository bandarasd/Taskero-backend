apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: taskero
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: REGISTRY/taskero-user-service:latest
          ports:
            - containerPort: 3001
          envFrom:
            - secretRef:
                name: taskero-db-secret
            - secretRef:
                name: taskero-cloudinary-secret
          env:
            - name: PORT
              value: "3001"
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /secrets/firebase/serviceAccountKey.json
          volumeMounts:
            - name: firebase-secret
              mountPath: /secrets/firebase
              readOnly: true
          resources:
            requests:
              memory: "96Mi"
              cpu: "50m"
            limits:
              memory: "192Mi"
              cpu: "300m"
      volumes:
        - name: firebase-secret
          secret:
            secretName: taskero-firebase-secret
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: taskero
spec:
  selector:
    app: user-service
  ports:
    - port: 3001
      targetPort: 3001
