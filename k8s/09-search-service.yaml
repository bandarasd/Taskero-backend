apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-service
  namespace: taskero
spec:
  replicas: 1
  selector:
    matchLabels:
      app: search-service
  template:
    metadata:
      labels:
        app: search-service
    spec:
      containers:
        - name: search-service
          image: REGISTRY/taskero-search-service:latest
          ports:
            - containerPort: 3005
          envFrom:
            - secretRef:
                name: taskero-db-secret
          env:
            - name: PORT
              value: "3005"
            # Elasticsearch is optional — if not deployed, search falls back to DB
            - name: ELASTICSEARCH_NODE
              value: ""
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /secrets/firebase/serviceAccountKey.json
          volumeMounts:
            - name: firebase-secret
              mountPath: /secrets/firebase
              readOnly: true
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
      volumes:
        - name: firebase-secret
          secret:
            secretName: taskero-firebase-secret
---
apiVersion: v1
kind: Service
metadata:
  name: search-service
  namespace: taskero
spec:
  selector:
    app: search-service
  ports:
    - port: 3005
      targetPort: 3005
