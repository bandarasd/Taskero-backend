apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: taskero
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: REGISTRY/taskero-api-gateway:latest
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: USER_SERVICE_URL
              value: "http://user-service:3001"
            - name: TASK_SERVICE_URL
              value: "http://task-service:3002"
            - name: CHAT_SERVICE_URL
              value: "http://chat-service:3003"
            - name: PAYMENT_SERVICE_URL
              value: "http://payment-service:3004"
            - name: SEARCH_SERVICE_URL
              value: "http://search-service:3005"
            - name: NOTIFICATION_SERVICE_URL
              value: "http://notification-service:3006"
            - name: EMAIL_SERVICE_URL
              value: "http://email-service:3007"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: taskero
spec:
  selector:
    app: api-gateway
  ports:
    - port: 3000
      targetPort: 3000
